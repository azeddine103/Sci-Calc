<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ultra-Calc Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="calculator.png">

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --num: #334155; --op: #0ea5e9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .mini-history { flex: 0 0 18%; background: rgba(0,0,0,0.2); padding: 10px 20px; display: flex; flex-direction: column; justify-content: flex-end; gap: 4px; overflow: hidden; }
        .hist-line { font-size: 0.85rem; color: #64748b; text-align: right; cursor: pointer; }
        .display-section { flex: 0 0 12%; padding: 0 20px 10px 20px; display: flex; align-items: flex-end; justify-content: flex-end; }
        #main-line { font-size: 3rem; width: 100%; text-align: right; overflow-x: auto; }
        .keypad { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #334155; }
        button { border: none; background: var(--card); color: white; font-size: 1.2rem; cursor: pointer; }
        button:active { filter: brightness(1.4); }
        .btn-op { color: var(--accent); font-weight: bold; }
        .btn-sci { background: #162031; color: #94a3b8; font-size: 0.8rem; }
        .btn-equal { background: var(--op); }
        .btn-ac { color: #ef4444; }
        #pwa-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000; justify-content: center; align-items: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="pwa-modal">
        <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--accent);">
            <h2>App installieren</h2>
            <p id="pwa-txt"></p>
            <button onclick="closeTutor()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">OK</button>
        </div>
    </div>

    <div class="mini-history" id="mini-history"></div>
    <div class="display-section"><div id="main-line">0</div></div>

    <div class="keypad">
        <button class="btn-sci" onclick="func('Math.PI')">π</button>
        <button class="btn-sci" onclick="func('Math.E')">e</button>
        <button class="btn-sci" onclick="append('**')">xʸ</button>
        <button class="btn-sci" onclick="func('Math.sqrt')">√</button>
        <button class="btn-ac" onclick="clearAll()">AC</button>
        <button class="btn-sci" onclick="func('Math.sin')">sin</button>
        <button class="btn-sci" onclick="func('Math.cos')">cos</button>
        <button class="btn-sci" onclick="append('(')">(</button>
        <button class="btn-sci" onclick="append(')')">)</button>
        <button class="btn-op" onclick="backspace()">⌫</button>
        <button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button><button class="btn-op" onclick="append('/')">÷</button><button class="btn-sci" onclick="alert('Verlauf gelöscht'); history=[]; localStorage.clear(); updateMiniHistory();">DEL H</button>
        <button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button><button class="btn-op" onclick="append('*')">×</button><button class="btn-sci" onclick="func('Math.log10')">log</button>
        <button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button><button class="btn-op" onclick="append('-')">−</button><button class="btn-equal" style="grid-row: span 2;" onclick="calculate()">=</button>
        <button onclick="append('0')" style="grid-column: span 2;">0</button><button onclick="append('.')">.</button><button class="btn-op" onclick="append('+')">+</button>
    </div>

    <script>
        const mainLine = document.getElementById('main-line');
        const miniHistory = document.getElementById('mini-history');
        let history = JSON.parse(localStorage.getItem('calc_final_v3')) || [];
        let isRes = false;

        function append(v) {
            if (isRes) { mainLine.innerText = (isNaN(v) && v !== '.') ? mainLine.innerText : '0'; isRes = false; }
            mainLine.innerText = mainLine.innerText === '0' && !isNaN(v) ? v : mainLine.innerText + v;
        }

        function func(n) { if (isRes) { mainLine.innerText = '0'; isRes = false; } if (n.includes('Math.P') || n.includes('Math.E')) append(Math[n.split('.')[1]].toFixed(6)); else mainLine.innerText = n + "("; }

        function calculate() {
            try {
                let expr = mainLine.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let r = eval(expr);
                let f = Number.isInteger(r) ? r : parseFloat(r.toFixed(8));
                history.unshift({ e: mainLine.innerText, r: f });
                localStorage.setItem('calc_final_v3', JSON.stringify(history.slice(0, 30)));
                mainLine.innerText = f; isRes = true; updateMiniHistory();
            } catch { mainLine.innerText = "Error"; isRes = true; }
        }

        function updateMiniHistory() {
            miniHistory.innerHTML = '';
            history.slice(0, 6).reverse().forEach(i => {
                const d = document.createElement('div'); d.className = 'hist-line'; d.innerText = `${i.e} = ${i.r}`;
                d.onclick = () => { mainLine.innerText = i.r; isRes = true; };
                miniHistory.appendChild(d);
            });
        }

        function clearAll() { mainLine.innerText = '0'; isRes = false; }
        function backspace() { mainLine.innerText = mainLine.innerText.slice(0, -1) || '0'; }
        function closeTutor() { document.getElementById('pwa-modal').style.display = 'none'; localStorage.setItem('calc_tutor', '1'); }

        // --- PWA LOGIK ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.onload = () => {
            updateMiniHistory();
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!localStorage.getItem('calc_tutor') && !isStandalone) {
                document.getElementById('pwa-modal').style.display = 'flex';
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                document.getElementById('pwa-txt').innerHTML = isIOS ? 'Tippe auf "Teilen" & "Zum Home-Bildschirm".' : 'Tippe auf die 3 Punkte & "App installieren".';
            }
        };
    </script>
</body>
</html>

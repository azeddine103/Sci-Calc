<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f3f4f7">
    <title>Pro Calc</title>
	<link rel="icon" type="image/png" href="calculator.png">
	<link rel="apple-touch-icon" href="calculator.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #f3f4f7;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --btn-num: #ffffff;
            --btn-sci: #f1f3f6;
            --btn-op: #e5e7eb;
            --accent: #ff7e32;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* HEADER Bereich für Verlauf & Symbole */
        header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px 0 20px;
            z-index: 10;
        }

        .icon-btn {
            background: none; border: none; font-size: 1.5rem; color: #8e8e93; cursor: pointer; padding: 5px;
        }

        /* Display Bereich - Höher gesetzt */
        .display-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px 25px 30px 25px; /* Mehr Abstand nach unten zum Keypad */
        }

        .mini-history {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 8px;
            max-height: 100px;
            overflow: hidden;
        }

        .hist-line {
            text-align: right;
            color: #8e8e93;
            font-size: 0.95rem;
            opacity: 0.8;
            white-space: nowrap;
        }

        #main-display {
            text-align: right;
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 300;
            word-wrap: break-word;
            overflow-x: auto;
            max-width: 100%;
            /* Keine blaue Linie/Cursor mehr */
            border-right: none; 
        }

        /* Keypad - Ein Stück höher (70% Höhe statt 65%) */
        .keypad {
            background: var(--card-bg);
            border-radius: 35px 35px 0 0;
            padding: 20px 12px calc(15px + env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 10px;
            height: 72%; 
            box-shadow: 0 -15px 40px rgba(0,0,0,0.08);
        }

        button {
            border: none;
            border-radius: 50%;
            background: var(--btn-sci);
            color: var(--text);
            font-size: clamp(0.85rem, 4.5vw, 1.2rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
        }

        button:active { background: #dce0e5; transform: scale(0.95); }

        .btn-num { background: var(--btn-num); font-size: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .btn-op { background: var(--btn-op); }
        .btn-equal { 
            background: var(--accent); 
            color: white; 
            border-radius: 40px; 
            grid-column: span 3; 
            font-size: 1.8rem;
        }
        
        .wide { grid-column: span 3; border-radius: 40px; }

        /* Verlauf-Modal */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; z-index: 2000;
            flex-direction: column; padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <button class="icon-btn" onclick="toggleFullHistory()">🕒</button>
        <button class="icon-btn" style="font-size: 1.2rem;">⌨️</button>
    </header>

    <div class="display-container">
        <div class="mini-history" id="mini-history"></div>
        <div id="main-display">0</div>
    </div>

    <div class="keypad">
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="mem('MC')">MC</button>
        <button onclick="mem('M+')">M+</button>
        <button onclick="mem('M-')">M-</button>
        <button onclick="mem('MR')">MR</button>

        <button onclick="fact()">x!</button>
        <button onclick="append('**2')">x²</button>
        <button onclick="append('**3')">x³</button>
        <button onclick="append('**')">xʸ</button>
        <button onclick="append('Math.exp(')">eˣ</button>
        <button onclick="append('Math.PI')">π</button>

        <button onclick="append('1/')">1/x</button>
        <button onclick="append('Math.sqrt(')">√</button>
        <button onclick="append('Math.cbrt(')">∛x</button>
        <button onclick="yroot()">ʸ√x</button>
        <button onclick="alert('Inverser Modus aktiv')">Inv</button>
        <button onclick="toggleRad()">Rad</button>

        <button onclick="append('Math.E')">e</button>
        <button onclick="append('Math.log(')">ln</button>
        <button onclick="append('Math.log10(')">log</button>
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>

        <button class="btn-op" style="color:#ef4444" onclick="clearAll()">C</button>
        <button class="btn-op" onclick="append('%')">%</button>
        <button class="btn-op" onclick="backspace()">⌫</button>
        <button class="btn-op wide" onclick="append('/')">÷</button>

        <button class="btn-num" onclick="append('7')">7</button>
        <button class="btn-num" onclick="append('8')">8</button>
        <button class="btn-num" onclick="append('9')">9</button>
        <button class="btn-op wide" onclick="append('*')">×</button>

        <button class="btn-num" onclick="append('4')">4</button>
        <button class="btn-num" onclick="append('5')">5</button>
        <button class="btn-num" onclick="append('6')">6</button>
        <button class="btn-op wide" onclick="append('-')">−</button>

        <button class="btn-num" onclick="append('1')">1</button>
        <button class="btn-num" onclick="append('2')">2</button>
        <button class="btn-num" onclick="append('3')">3</button>
        <button class="btn-op wide" onclick="append('+')">+</button>

        <button class="btn-num" onclick="plusMinus()">+/-</button>
        <button class="btn-num" onclick="append('0')">0</button>
        <button class="btn-num" onclick="append('.')">,</button>
        <button class="btn-equal" onclick="calculate()">=</button>
    </div>

    <div id="history-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Verlauf</h2>
            <button onclick="toggleFullHistory()" style="font-size:1.5rem; background:none; border:none;">✕</button>
        </div>
        <div id="full-history-list" style="overflow-y:auto; flex:1;"></div>
        <button onclick="clearHistory()" style="background:#ef4444; color:white; border:none; padding:15px; border-radius:10px; margin-top:10px;">Verlauf löschen</button>
    </div>

    <script>
        const display = document.getElementById('main-display');
        const miniHist = document.getElementById('mini-history');
        let history = JSON.parse(localStorage.getItem('calc_v6_honor')) || [];
        let isRes = false;

        function append(v) {
            if (isRes && !isNaN(v)) { display.innerText = '0'; isRes = false; }
            if (display.innerText === '0' && !isNaN(v)) display.innerText = v;
            else display.innerText += v;
            isRes = false;
        }

        function calculate() {
            try {
                let expr = display.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let r = eval(expr);
                let f = Number.isInteger(r) ? r : parseFloat(r.toFixed(8));
                saveH(display.innerText, f);
                display.innerText = f;
                isRes = true;
            } catch { display.innerText = "Error"; isRes = true; }
        }

        function saveH(e, r) {
            history.unshift({e, r});
            localStorage.setItem('calc_v6_honor', JSON.stringify(history.slice(0, 50)));
            updateUI();
        }

        function updateUI() {
            miniHist.innerHTML = history.slice(0, 3).reverse().map(h => `<div class="hist-line">${h.e} = ${h.r}</div>`).join('');
        }

        function toggleFullHistory() {
            const modal = document.getElementById('history-modal');
            const list = document.getElementById('full-history-list');
            const isOpen = modal.style.display === 'flex';
            modal.style.display = isOpen ? 'none' : 'flex';
            if (!isOpen) {
                list.innerHTML = history.map(h => `<div style="padding:15px; border-bottom:1px solid #ddd; text-align:right" onclick="useHist('${h.r}')"><small>${h.e}</small><br><strong>= ${h.r}</strong></div>`).join('');
            }
        }

        function useHist(v) { display.innerText = v; toggleFullHistory(); isRes = true; }
        function clearHistory() { history = []; localStorage.removeItem('calc_v6_honor'); updateUI(); toggleFullHistory(); }
        function clearAll() { display.innerText = '0'; isRes = false; }
        function backspace() { display.innerText = display.innerText.slice(0, -1) || '0'; }
        function plusMinus() { display.innerText = (parseFloat(display.innerText) * -1).toString(); }
        function fact() { let n = parseInt(display.innerText); let r = 1; for(let i=2; i<=n; i++) r *= i; display.innerText = r; isRes = true; }

        window.onload = updateUI;
    </script>
</body>
</html>
